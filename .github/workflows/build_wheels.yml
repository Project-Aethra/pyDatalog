name: Build

permissions:
  contents: read

on: [push, pull_request]

jobs:
  make_sdist:
    name: Make SDist
    runs-on: magnon-enterprise-runners
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Optional, use if you use setuptools_scm
        submodules: true  # Optional, use if you have submodules

    - name: Build SDist
      run: pipx run build --sdist

    - uses: actions/upload-artifact@v3
      with:
        path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, windows-2019, macos-11]

    steps:
      - uses: actions/checkout@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.11.2
        # env:
        #   CIBW_SOME_OPTION: value
        #    ...
        # with:
        #   package-dir: .
        #   output-dir: wheelhouse
        #   config-file: "{package}/pyproject.toml"

      - uses: actions/upload-artifact@v3
        with:
          path: ./wheelhouse/*.whl

  # REMOVED: upload_all job (pypa/gh-action-pypi-publish to public pypi.org).
  # No-public-publishing policy: all code is private.
  # Never publish to public PyPI, npm, crates.io, or any public registry.
  # If package distribution is needed, use the private Magnon registry (PRIVATE_PYPI_URL).